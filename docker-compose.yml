services:
  postgres:
    image: postgres:17-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-collector
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=trading;Username=trader;Password=secret"
    restart: unless-stopped

volumes:
  postgres_data:
